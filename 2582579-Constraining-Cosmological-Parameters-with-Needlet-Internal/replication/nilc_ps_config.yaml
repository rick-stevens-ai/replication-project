# Config for NILC-PS-Model replication of Surrao & Hill 2024 Paper I.
# Paper values (Tables + text): nside=32, lmax=20, 90/150 GHz, noise 30000 uK-arcmin,
# tSZ amp = 1000, 3 needlet scales (Gaussian-difference FWHM 1000 and 800 arcmin).

